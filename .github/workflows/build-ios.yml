name: Build iOS App (Capacitor)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web app
        run: npx vite build
        env:
          POCKT_ONEDRIVE_CLIENT_ID: ${{ secrets.POCKT_ONEDRIVE_CLIENT_ID }}

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS (unsigned, no code signing)
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Archive for release
        if: startsWith(github.ref, 'refs/tags/') && secrets.IOS_CERTIFICATE_BASE64
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/Pockt.xcarchive \
            archive

      - name: Upload simulator build
        uses: actions/upload-artifact@v4
        with:
          name: pockt-ios-simulator
          path: ios/App/build/Build/Products/Debug-iphonesimulator/App.app
          if-no-files-found: warn

      - name: Upload archive
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: pockt-ios-archive
          path: ios/App/build/Pockt.xcarchive
          if-no-files-found: warn
