name: Build Android APK (Capacitor)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web app
        run: npx vite build
        env:
          POCKT_ONEDRIVE_CLIENT_ID: ${{ secrets.POCKT_ONEDRIVE_CLIENT_ID }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Sign release APK
        if: startsWith(github.ref, 'refs/tags/') && secrets.KEYSTORE_BASE64
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > pockt.keystore
          "$ANDROID_HOME"/build-tools/34.0.0/apksigner sign \
            --ks pockt.keystore \
            --ks-key-alias pockt \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pockt-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: pockt-android-release
          path: android/app/build/outputs/apk/release/*.apk
